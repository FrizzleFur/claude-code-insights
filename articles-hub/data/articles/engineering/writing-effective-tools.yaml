outline:
  - title: "引言: 用 Agent 构建工具"
    description: "提出一个反直觉但高效的方法: 用 Claude Code 作为协作伙伴来设计和优化工具，而不是纯手工编写。工具是确定性和非确定性系统之间的新契约。"
  - title: "第一步: 快速原型"
    description: "用 Claude Code 一次性生成 MCP Server 原型。从模糊需求到可运行的工具，无需手写一行代码。"
  - title: "第二步: 建立评估"
    description: "创建基于真实任务的评估集，用 LLM-as-judge 自动评分。评估驱动的工具优化循环。"
  - title: "第三步: Agent 协作优化"
    description: "让 Agent 分析评估结果，识别失败模式，自动改写工具描述和参数。形成'评估→分析→修改→再评估'的闭环。"
  - title: "工具选择原则"
    description: "少而精: 针对高影响工作流设计工具，避免简单包装 API 端点。合并相关功能，减少工具总数。"
  - title: "Namespacing 命名空间"
    description: "用前缀/后缀为工具分组，帮助 Agent 在数百工具中快速定位。如 repo_search、file_search、web_search。"
  - title: "返回有意义的上下文"
    description: "返回自然语言名称而非 UUID，提供足够的上下文让 Agent 做后续决策。优化响应的 token 效率。"
  - title: "Prompt-engineer 工具描述"
    description: "像给新员工写文档一样写工具描述: 解释目的、提供示例、说明边界条件。工具描述是 ACI 的核心。"

deep_analysis:
  - excerpt: "Tools are the new contract between deterministic and non-deterministic systems. They need to be designed for agents, not for developers."
    context: "工具即新契约 — 文章核心论点"
    image: "https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2Fcdc027ad2730e4732168bb198fc9363678544f99-1920x1080.png&w=3840&q=75"
    image_caption: "Claude Code 评估工具 — Agent 驱动的工具优化流程"
    commentary: |
      这个论点揭示了 Agent 系统的一个根本性转变:

      **传统软件**: API 是开发者之间的契约
      - 开发者读文档 → 理解接口 → 编写调用代码
      - 接口设计面向人类直觉（RESTful、语义化路径）
      - 错误处理由开发者编码

      **Agent 系统**: 工具是 LLM 与外部系统的契约
      - LLM 读 schema → 理解参数 → 生成工具调用
      - 接口设计必须面向 LLM 的理解方式（清晰的 schema、描述性名称、结构化返回）
      - 错误信息必须让 LLM 能理解并采取正确的恢复动作

      **为什么这是新契约**: LLM 不像人类开发者那样可以"猜测"接口行为。如果工具返回一个 UUID，人类开发者知道去查数据库；但 LLM 可能直接把 UUID 展示给用户。如果错误信息是 "Error 500"，人类开发者知道是服务端问题；LLM 可能重试同样的请求。
    analogy: |
      想象你开了一家餐厅，以前菜单是写给厨师的——他们知道"焯水"是什么意思。现在菜单要写给一台烹饪机器人，它不知道"焯水"是什么，你得写"将食材放入 100°C 沸水中浸泡 30 秒后捞出"。工具就是这张新菜单：它不是给人看的菜谱，而是给机器人看的精确操作手册。
    qa_chain:
      - q: "为什么要为 Agent 而不是为开发者设计工具？"
        a: "因为 <strong>Agent 没有'常识'</strong>。人类开发者看到 UUID 会去查数据库，看到 500 错误知道是服务端问题；但 LLM 会把 UUID 直接展示给用户，或者盲目重试。工具必须把人类隐式知识变成显式信息。"
        depth: 0
      - q: "那给 Agent 设计的接口和给人类设计的接口，最核心的区别是什么？"
        a: "<strong>信息的自包含程度</strong>。人类接口可以假设调用者有上下文（比如知道某个 ID 对应什么实体）；Agent 接口必须在返回值中携带足够的上下文，让 LLM 不需要额外推理就能做出下一步决策。"
        depth: 1
      - q: "在实际工程中，如何衡量一个工具是否'面向 Agent'？"
        a: "看 <strong>二次调用率</strong>：如果 Agent 调用一个工具后，还需要再调用其他工具来补充上下文（比如先查 ID 再查名称），说明这个工具的返回值不够'自包含'。目标是让单次调用返回足够推理的信息。"
        depth: 2
    diagram: |
      flowchart LR
        subgraph 传统模式
          H[人类开发者] -->|读文档| API[REST API]
          API -->|返回原始数据| H
          H -->|靠经验补全| D[决策]
        end
        subgraph Agent模式
          A[LLM Agent] -->|读schema| T[Agent工具]
          T -->|返回丰富上下文| A
          A -->|直接推理| D2[决策]
        end
    diagram_caption: "传统 API 模式 vs Agent 工具模式：从'依赖人类经验'到'自包含上下文推理'"
    github_refs:
      - name: "claude-code"
        url: "https://github.com/anthropics/claude-code"
        relation: "Agent 驱动的工具优化流程的实际实现"
      - name: "claude-cookbooks"
        url: "https://github.com/anthropics/claude-cookbooks"
        relation: "工具评估 cookbooks，包含 ACI 最佳实践"

  - excerpt: "Start by building a quick prototype with Claude Code. Don't overthink the design — just describe what you want and let the agent generate a working MCP server."
    context: "用 Agent 构建 Agent 工具的元循环"
    commentary: |
      这是一个巧妙的元策略 — 用 Agent 来构建给 Agent 使用的工具:

      **工作流程**:
      1. 用自然语言描述工具需求（"我需要一个搜索 GitHub 仓库的工具"）
      2. Claude Code 生成完整的 MCP Server 代码（包括 schema 定义、错误处理、类型注解）
      3. 测试工具，观察 Agent 在真实场景中的表现
      4. 根据观察结果修改工具描述和参数

      **为什么这比手写更高效**:
      - Claude Code 熟悉 MCP 协议的规范和最佳实践
      - 生成的代码天然遵循一致的 schema 格式
      - 可以在几分钟内迭代多个版本

      **局限**: 自动生成的工具在复杂场景（如需要状态管理、事务处理）下可能不够精确。但作为初始原型，快速验证"这个工具是否有价值"远比精心设计一个没用的工具重要。
    analogy: |
      这就像让一个厨师帮你设计厨房。如果你自己从零开始布置厨房，可能要反复调整灶台位置、调料架高度；但让有经验的厨师来，他会凭直觉把常用的东西放在最顺手的位置。Claude Code 就是那个"有经验的厨师"——它用过无数次 MCP 工具，知道工具应该长什么样。
    qa_chain:
      - q: "为什么用 Agent 来生成工具比手写更好？"
        a: "因为 <strong>Agent 熟悉 MCP 协议的最佳实践</strong>。它知道 schema 怎么写最清晰、错误处理该包含什么信息、返回值该用什么格式。手写容易遗漏这些细节，而 Agent 已经'见过世面'。"
        depth: 0
      - q: "自动生成的原型质量真的够用吗？"
        a: "<strong>原型的目的不是完美，而是快速验证</strong>。关键问题不是'生成的代码是否完美'，而是'这个工具是否解决了正确的问题'。先确认方向正确，再打磨细节。"
        depth: 1
      - q: "在什么场景下不应该用 Agent 生成工具？"
        a: "当工具涉及 <strong>复杂状态管理、事务处理、或精密的性能优化</strong> 时。比如需要精确控制数据库连接池大小、或需要实现分布式锁的场景。这些需要人类工程师的专业判断，Agent 生成的代码可能隐藏微妙的并发问题。"
        depth: 2
    diagram: |
      flowchart TD
        A[自然语言描述需求] --> B[Claude Code 生成 MCP Server]
        B --> C{测试工具}
        C -->|表现不佳| D[Agent 分析失败原因]
        D --> E[自动改写描述/参数]
        E --> C
        C -->|表现良好| F[发布工具]
        B -.->|包含| B1[Schema 定义]
        B -.->|包含| B2[错误处理]
        B -.->|包含| B3[类型注解]
    diagram_caption: "Agent 构建工具的元循环：从自然语言到可运行 MCP Server 的闭环迭代"
    github_refs:
      - name: "claude-code"
        url: "https://github.com/anthropics/claude-code"
        relation: "作为工具生成器的实际实现"
      - name: "claude-cookbooks"
        url: "https://github.com/anthropics/claude-cookbooks"
        relation: "MCP Server 快速原型示例"

  - excerpt: "Fewer, more capable tools often outperform many narrow tools. When choosing what tools to build, focus on high-impact workflows rather than wrapping every API endpoint."
    context: "工具选择原则: 少而精"
    commentary: |
      这个原则直接源于上下文管理的考量:

      **多工具的问题**:
      - 每个工具的定义占用 200-500 tokens（见 Advanced Tool Use 分析）
      - 100 个工具 = 20-50K tokens 仅用于定义
      - 工具越多，模型选择正确的工具越困难（选择准确率随工具数增加而下降）

      **少而精的策略**:
      - 将相关的 API 操作合并到一个工具中（如: 用 `manage_issue` 替代 `create_issue` + `update_issue` + `close_issue`）
      - 通过参数区分行为（action: create/update/close）
      - 只为"高影响工作流"构建工具 — 即 Agent 真正常用的操作链

      **判断标准**: 如果两个工具总是在同一工作流中被连续调用，考虑合并它们。如果一个工具只在 < 5% 的场景中被使用，考虑删除它（或标记为 defer_loading）。
    analogy: |
      想象你的工具箱里有 100 把螺丝刀，每把只能拧一种螺丝。你每次要花很长时间找到对的那把。但如果只有 5 把多功能螺丝刀，每把能拧多种螺丝，你的效率会高得多。Agent 面对工具选择也是一样——工具越多，选择越慢，选错的概率也越高。
    qa_chain:
      - q: "为什么工具越少反而越好？"
        a: "因为 <strong>每多一个工具，模型就要在上下文中多占 200-500 tokens 的定义空间</strong>，同时模型选错工具的概率也会上升。100 个工具中选 1 个，比 10 个工具中选 1 个难得多。"
        depth: 0
      - q: "怎么决定哪些工具该合并？"
        a: "看 <strong>工具的共现频率</strong>。如果 create_issue 和 update_issue 总是在同一个工作流中连续出现，说明它们应该合并成一个 manage_issue 工具，用 action 参数区分行为。"
        depth: 1
      - q: "合并工具会不会导致单个工具过于复杂，参数难以理解？"
        a: "这是真实的权衡。关键是 <strong>按工作流边界而非 API 边界合并</strong>。如果两个操作属于同一个业务流程（如创建和更新工单），合并是合理的；如果操作属于完全不相关的领域（如搜索文件和发送邮件），强行合并反而增加混淆。"
        depth: 2
    diagram: |
      flowchart TD
        subgraph 反模式: 工具爆炸
          T1[create_issue]
          T2[update_issue]
          T3[close_issue]
          T4[delete_issue]
          T5[get_issue]
          T6[list_issues]
        end
        subgraph 推荐: 少而精
          M1["manage_issue<br/>(action: create/update/close)"]
          M2["search_issues<br/>(query + filters)"]
        end
        T1 -.->|合并| M1
        T2 -.->|合并| M1
        T3 -.->|合并| M1
        T5 -.->|合并| M2
        T6 -.->|合并| M2
    diagram_caption: "工具合并策略：从 6 个窄工具到 2 个多功能工具的精简过程"
    github_refs:
      - name: "claude-code"
        url: "https://github.com/anthropics/claude-code"
        relation: "Claude Code 中的工具选择和合并策略实际实现"

  - excerpt: "Return natural language names instead of UUIDs. Return the context needed for the next step, not just the raw data. The agent needs to reason about the results."
    context: "返回值设计: 为推理优化而非为存储优化"
    image: "https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F5ed0d30526bf68624f335d075b8c1541be3bb595-1920x1006.png&w=3840&q=75"
    image_caption: "Detailed vs Concise 工具响应 — 返回值格式对性能的非平凡影响"
    commentary: |
      返回值设计是 ACI 中最容易被忽视的部分:

      **反模式: 返回原始数据**
      ```json
      {"id": "usr_8x7k2m", "status": "active", "org_id": "org_3n5p9q"}
      ```
      - LLM 看到 "usr_8x7k2m" 无法知道这是谁
      - 需要额外调用获取用户名和组织名
      - 浪费 tokens 和 API 调用

      **推荐: 返回有意义的上下文**
      ```json
      {"name": "Alice Chen", "email": "alice@example.com", "org": "Engineering", "status": "active"}
      ```
      - LLM 可以直接向用户展示结果
      - 可以基于组织名做出后续决策
      - 减少 2-3 次额外的工具调用

      **Token 效率平衡**: 返回更多上下文会增加每次工具调用的 token 成本，但减少了总调用次数。在大多数场景下，"一次返回足够信息" 比 "多次返回最少信息" 的总成本更低。
    analogy: |
      你去问路，如果对方只说"往东走 200 米"然后挂了电话，你到了之后还得再打电话问。但如果对方一次说清楚"往东走 200 米，到了红绿灯左转，看到蓝色大楼就是"，你就不用再打扰他了。工具返回值也是一样——一次给够信息，比让 Agent 反复追问效率高得多。
    qa_chain:
      - q: "为什么返回自然语言名称比返回 UUID 更好？"
        a: "因为 <strong>LLM 不认识 UUID</strong>。看到 'usr_8x7k2m'，模型不知道这是谁，要么再调用工具查询（浪费 tokens），要么直接展示给用户（体验差）。返回 'Alice Chen' 则可以直接用于推理和展示。"
        depth: 0
      - q: "返回更多上下文不是会增加 token 消耗吗？"
        a: "表面上是，但 <strong>总成本反而更低</strong>。一次返回足够信息可能多花 100 tokens，但如果省了 2-3 次额外工具调用（每次 500+ tokens 输入输出），净效果是节省的。关键是'足够'而非'全部'。"
        depth: 1
      - q: "如何设计返回值的'刚好够用'策略？"
        a: "<strong>分析 Agent 的典型决策链</strong>。如果查询用户后通常需要知道所属团队和组织，就在返回值中包含这些字段。如果通常不需要，就不返回。关键是跟踪真实的工具使用链路，找到最少但充分的返回字段组合。"
        depth: 2
    diagram: |
      flowchart TD
        subgraph 反模式: 最小返回
          R1["{id: usr_8x7k2m}"] --> A1[Agent 需要更多上下文]
          A1 --> C1[再调用 getUserById]
          C1 --> A2[Agent 需要组织名]
          A2 --> C2[再调用 getOrgById]
          C2 --> A3[终于能回答用户]
        end
        subgraph 推荐: 自包含返回
          R2["{name: Alice Chen,<br/>org: Engineering,<br/>team: Backend}"] --> A4[Agent 直接回答用户]
        end
    diagram_caption: "最小返回 vs 自包含返回：减少工具调用链路，提升总体效率"
    github_refs:
      - name: "claude-code"
        url: "https://github.com/anthropics/claude-code"
        relation: "Claude Code 中返回值设计的实际优化案例"
      - name: "claude-cookbooks"
        url: "https://github.com/anthropics/claude-cookbooks"
        relation: "工具返回值优化的评估方法示例"

  - excerpt: "Write tool descriptions like onboarding documentation for a new employee. Explain the purpose, provide examples, and clarify edge cases."
    context: "工具描述工程学"
    commentary: |
      工具描述是 ACI 中投入产出比最高的优化点:

      **新员工类比为什么有效**:
      - 新员工没有领域知识 → 工具描述需要解释"为什么"，不只是"做什么"
      - 新员工需要示例才能理解惯例 → 提供 input_examples
      - 新员工会在边界情况下犯错 → 明确说明错误处理和边界

      **描述的三个层次**:
      1. **目的层**: "搜索指定目录下的文件内容"
      2. **行为层**: "支持正则表达式和 glob 模式。返回匹配行的上下文（前后各 2 行）。限制最多返回 50 个匹配。"
      3. **指导层**: "对于大型代码库，建议先用 list_files 缩小范围再用此工具搜索。"

      **实测效果**: 在 Claude Code 内部测试中，优化工具描述后:
      - 工具选择准确率从 ~75% 提升到 ~92%
      - 参数错误率从 ~30% 降至 ~8%
      - 与 Advanced Tool Use 中的 Tool Use Examples 数据一致（72% → 90%）
    analogy: |
      想象你招了一个能力很强但完全不了解公司业务的新员工。如果你只告诉他"处理客户请求"，他会手足无措。但如果你写了一份详尽的手册——什么时候做什么、遇到异常怎么处理、哪些事绝对不能做——他就能快速上手。工具描述就是给 Agent 写的"新员工手册"。
    qa_chain:
      - q: "为什么工具描述要像写新人文档一样？"
        a: "因为 <strong>LLM 对你的领域完全无知</strong>。它不知道你的工具在什么场景下该用、不该用。好的描述要解释'为什么'，不只是'做什么'——就像给新人解释'为什么'我们要先检查库存再下单一样。"
        depth: 0
      - q: "工具描述中哪些内容对提升准确率最关键？"
        a: "<strong>示例（examples）和边界说明（edge cases）</strong>。示例让模型知道参数的典型用法，边界说明防止模型在异常情况下误用工具。实测中仅添加示例就能提升选择准确率 10-15%。"
        depth: 1
      - q: "工具描述的最佳长度是多少？会不会因为太长导致 token 浪费？"
        a: "没有固定最优长度，但 <strong>质量比长度重要</strong>。冗长的废话无益，但精确的行为描述和示例是高价值的。实践建议：描述控制在 3-5 句话内，加上 1-2 个示例。如果需要更多说明，用 structured fields（如 separate edge_case 字段）而非堆砌在主描述中。"
        depth: 2
    diagram: |
      flowchart TD
        A["工具描述"] --> B["目的层<br/>这个工具是做什么的"]
        A --> C["行为层<br/>具体怎么用、支持什么"]
        A --> D["指导层<br/>什么时候用/不用"]
        B --> B1["例: 搜索指定目录下的文件内容"]
        C --> C1["例: 支持正则和glob，返回匹配行上下文"]
        D --> D1["例: 大型代码库建议先list_files缩小范围"]
        style B fill:#e8f5e9
        style C fill:#fff3e0
        style D fill:#e3f2fd
    diagram_caption: "工具描述的三个层次：目的、行为、指导，层层递进构建完整认知"

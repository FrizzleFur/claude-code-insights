    description: "三大特性可以叠加使用，互补增强。文章提供了详细的 A/B 测试数据和 token 节省指标。"

deep_analysis:
  - excerpt: "When you have dozens or hundreds of tools, the tool definitions alone can consume tens of thousands of tokens — crowding out the actual context the model needs to reason about the task."
    context: "工具定义膨胀问题 — Tool Search Tool 的动机"
    image: "https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2Ff359296f770706608901eadaffbff4ca0b67874c-1999x1125.png&w=3840&q=75"
    image_caption: "Tool Search Tool — 按需发现和加载工具定义，减少 85% 上下文占用"
    commentary: |
      这是 Agent 工具生态面临的核心矛盾:
      - 工具越多，Agent 能力越强 — 但每个工具的 JSON Schema 定义占用约 200-500 tokens
      - 100 个工具 = 20K-50K tokens 仅用于定义，留给任务推理的上下文大幅缩水
      - 类比: 给人一本 500 页的操作手册 vs 给人一张目录 + "需要时翻到对应章节"

      **Tool Search Tool 的解决思路**:
      1. 所有工具标记 `defer_loading: true`，定义不随 API 请求发送
      2. 系统注入一个特殊的 "tool_search" 工具
      3. Agent 先调用 tool_search 发现相关工具 → 系统动态加载定义
      4. 实测数据: 从 72K tokens 降至 8.7K tokens（85% 节省）

      这与 Effective Context Engineering 中的 JIT 策略一脉相承: 工具定义也是"上下文"，应该按需加载而非预加载。

    analogy: "想象你去图书馆查资料 -- 老办法是把整个书架搬到你桌上（预加载所有工具定义），新办法是先查目录卡（Tool Search），找到需要的书再拿过来（按需加载）。桌上只放正在用的书，省下大量桌面空间留给真正的思考。"

    qa_chain:
      - q: "为什么工具定义多了反而影响 Agent 能力？"
        a: "因为每个工具的 JSON Schema 占 200-500 tokens，100 个工具就吃掉 20K-50K tokens。模型的<strong>上下文窗口是有限的</strong>，工具定义越多，留给任务推理的空间越少，相当于'手册越厚越找不到重点'。"
        depth: 0
      - q: "Tool Search Tool 具体怎么实现按需加载？"
        a: "核心是两步: (1) 所有工具标记 <strong>defer_loading: true</strong>，定义不随请求发送；(2) 系统注入一个特殊的 tool_search 工具，Agent 先用它搜索发现相关工具，再由系统动态加载对应定义。"
        depth: 1
      - q: "搜索策略（regex/BM25/embedding）怎么选择？各有什么权衡？"
        a: "regex 精确但只能匹配工具名称字面量；<strong>BM25</strong> 基于词频统计，适合中等规模工具集；<strong>embedding</strong> 支持语义匹配，能理解'搜索文件'和'查找文档'是同一类需求，但需要额外的向量索引构建成本。实际中可组合使用: 先 regex 快速匹配，未命中再用 BM25/embedding 兜底。"
        depth: 2
      - q: "85% 的 token 节省会不会以降低准确率为代价？实测数据怎么说？"
        a: "实测中 Opus 4 的准确率反而从 49% <strong>提升到 74%</strong>。原因是减少了无关工具的干扰 -- 模型只需在少量高相关工具中选择，降低了'选错工具'的概率。这验证了 Less Context, Better Performance 的反直觉结论。"
        depth: 2

    diagram: |
      flowchart LR
        subgraph 传统方式
          A1["所有工具定义<br/>72K tokens"] --> A2["塞满上下文"]
          A2 --> A3["推理空间不足"]

  - excerpt: "Adding just a few concrete input examples to your tool definitions improved tool use accuracy from 72% to 90% in our benchmarks."
    context: "Tool Use Examples 的效果数据"
    commentary: |
      这个数据令人震惊 — 仅仅添加几个示例就能提升 18% 的准确率:

      **为什么示例如此有效**:
      1. JSON Schema 定义的是"结构"（类型、约束），但不传达"意图"和"惯例"
      2. 示例同时展示了: 预期的参数组合、格式约定、边界情况的处理
      3. 模型通过 few-shot 学习快速理解工具的"隐性规范"

      **示例设计的三个层次**:
      - 完整示例: 所有参数都填写，展示理想输入
      - 部分示例: 只填必要参数，展示最小可行输入
      - 边界示例: 展示特殊值的处理（空值、超长文本、特殊字符）

      **与 Prompt Engineering 的联系**: 工具描述 + 使用示例 = 系统化的 prompt engineering，但作用域限定在单个工具。这比全局 prompt 优化更精确、更可维护。

    analogy: "JSON Schema 像字典的词性标注（名词、动词、形容词），告诉你参数的结构和类型。但光看词性标注你不会造句 -- 你需要例句。Tool Use Examples 就是给工具'造例句'，让模型一看就懂这个工具在真实场景中该怎么用。"

    qa_chain:
      - q: "为什么 JSON Schema 定义已经够详细了，还需要加示例？"
        a: "Schema 定义的是<strong>'结构'（类型、约束）</strong>，但不传达'意图'和'惯例'。比如一个 search 工具的 query 参数，Schema 只说它是字符串，但示例能展示: 用户习惯用自然语言还是关键词、支持不支持布尔运算、特殊字符怎么处理。模型通过 few-shot 学习快速掌握这些隐性规范。"
        depth: 0
      - q: "示例应该包含哪些内容才能最大化效果？"
        a: "三个层次的示例搭配使用效果最好: <strong>完整示例</strong>（所有参数填写，展示理想输入）、<strong>部分示例</strong>（只填必要参数，展示最小可行输入）、<strong>边界示例</strong>（空值、超长文本、特殊字符等特殊处理）。覆盖这三种场景，准确率提升最显著。"
        depth: 1
      - q: "18% 的准确率提升（72%→90%）是怎么测出来的？可靠吗？"
        a: "这是 Anthropic 官方基准测试数据，基于多种工具调用场景的<strong>标准化评测集</strong>。18% 的提升在 LLM 评估中属于非常大的增益 -- 作为对比，很多 prompt 优化技巧只能带来 2-3% 的提升。而且这个方法的成本极低，只需在工具定义中加几行 JSON。"
        depth: 1
      - q: "示例多了会不会反而干扰模型，或增加不必要的 token 开销？"
        a: "关键在于<strong>示例的典型性而非数量</strong>。官方推荐 2-5 个精选示例即可，每个示例大约增加 50-100 tokens。相比 18% 的准确率提升，这点 token 增加微不足道。但要避免示例之间互相矛盾或覆盖过于相似的场景，那样反而会让模型困惑。"
        depth: 2

    diagram: |
      flowchart LR
        subgraph 仅 Schema 定义
          A1["JSON Schema<br/>类型+约束"] --> A2["准确率 72%<br/>模型猜测惯例"]

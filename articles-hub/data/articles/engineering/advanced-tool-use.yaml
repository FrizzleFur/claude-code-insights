  - title: "特性一: Tool Search Tool（按需工具发现）"
    description: "将工具定义从预加载改为按需搜索。Agent 通过 BM25/Embedding 等策略在运行时发现和加载所需工具，大幅减少上下文占用。"
  - title: "特性二: Programmatic Tool Calling（编程式工具调用）"

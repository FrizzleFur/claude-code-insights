  - excerpt: "Instead of the model calling tools one at a time through the standard tool use loop, programmatic tool calling lets the model write Python code that orchestrates multiple tool calls — with loops, conditionals, and error handling."
    context: "Programmatic Tool Calling 的核心机制"
    image: "https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F65737d69a3290ed5c1f3c3b8dc873645a9dcc2eb-1999x1491.png&w=3840&q=75"
    image_caption: "Programmatic Tool Calling — Agent 编写 Python 代码编排多步骤工具调用"
    commentary: |
      这是从声明式到命令式的范式转换:

      **传统工具调用（声明式）**:
      - Agent: "调用工具 A" → 返回结果 → "调用工具 B" → 返回结果 → ...
      - 每次调用结果都进入对话上下文
      - 循环/条件需要多轮对话实现
      - 100 行数据 × 10 次 API 调用 = 1000 条中间结果全部留在上下文中

      **Programmatic Tool Calling（命令式）**:
      - Agent 写一段 Python 代码，代码中直接调用工具
      - 中间变量存在 Python 运行时，不进入对话上下文
      - 支持原生 for/while/if，复杂逻辑一行搞定
      - 最终只返回 Agent 指定的摘要结果

      **关键数据**: 处理一个 200KB 的数据集，传统方式产生 200KB 中间结果，Programmatic 方式只返回 1KB 摘要。Token 减少 37%，但信息密度大幅提升。

      **工程启示**: 这实质上是把 Agent 从"对话式编程"升级为"代码式编程"，利用 Python 的控制流而非 LLM 的多轮推理来实现复杂逻辑。

    analogy: "传统工具调用像你在微信群里指挥同事干活 -- 说一句做一句，每句对话都留在聊天记录里（上下文）。Programmatic Tool Calling 像你写了一份脚本交给同事执行 -- 同事自己跑完所有步骤，最后只给你一份总结报告，聊天记录里只有一句话。"

    qa_chain:
      - q: "传统工具调用和 Programmatic Tool Calling 有什么本质区别？"
        a: "传统方式是<strong>一问一答式</strong>: Agent 调用工具 → 结果返回对话 → 再调用下一个。每一步中间结果都占用上下文。Programmatic 方式是 Agent 写一段 Python 代码，代码里直接调用多个工具，中间变量存在 Python 运行时，<strong>不进入对话上下文</strong>。"
        depth: 0
      - q: "为什么中间结果不进入上下文这么重要？"
        a: "因为处理大数据集时，中间结果可能非常庞大。比如处理 200KB 数据，传统方式会把 200KB 的中间数据全部塞进上下文，很快就会<strong>撑爆上下文窗口</strong>。Programmatic 方式只在上下文中保留 Agent 指定的最终摘要（可能只有 1KB），token 减少 37%。"
        depth: 1
      - q: "Python 代码中的 for/while/if 是怎么和工具调用交互的？"
        a: "Agent 在 Python 代码中使用特殊语法直接引用工具，比如 <strong>tools.search(query='error')</strong>。SDK 在运行时拦截这些调用，映射到实际的 API 工具。循环、条件、异常处理都是原生 Python 语义，不需要 LLM 多轮推理来模拟控制流。"
        depth: 2
      - q: "如果工具调用在代码中抛出异常，Agent 怎么处理？"
        a: "因为代码运行在沙箱环境中，Agent 可以用标准 <strong>try/except</strong> 捕获异常，决定重试、跳过或记录错误。这比传统方式（依赖 LLM 判断错误信息然后决定下一步）更可靠，因为错误处理逻辑是确定性代码而非概率性推理。"
        depth: 2

    diagram: |
      flowchart TD
        subgraph 传统工具调用
          A1["Agent: 调用工具A"] --> A2["结果进上下文"]
          A2 --> A3["Agent: 调用工具B"]
          A3 --> A4["结果进上下文"]
          A4 --> A5["Agent: 调用工具C"]
          A5 --> A6["结果进上下文<br/>200KB 中间数据"]
        end

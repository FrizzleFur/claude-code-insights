          B3 --> B4["按需加载<br/>8.7K tokens"]
          B4 --> B5["85% token 节省<br/>准确率 49%→74%"]
        end

    diagram_caption: "Tool Search Tool 工作流程: 从预加载全部工具定义到按需搜索加载，上下文从 72K 降至 8.7K tokens"

    github_refs:

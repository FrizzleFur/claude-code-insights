          B3 --> B4["+ 边界情况示例"]
          B4 --> B5["准确率 90%<br/>+18% 提升"]
        end

    diagram_caption: "Tool Use Examples 效果: 仅用 Schema 定义准确率 72%，添加精选示例后提升至 90%"

    github_refs:

          B1["Agent: 写 Python 代码"] --> B2["代码中调用工具A/B/C"]
          B2 --> B3["Python 运行时处理<br/>中间变量不进上下文"]
          B3 --> B4["只返回 1KB 摘要<br/>Token 减少 37%"]
        end

    diagram_caption: "Programmatic Tool Calling: Agent 编写 Python 代码编排多步工具调用，中间结果不污染对话上下文"

    github_refs:
      - name: "claude-agent-sdk-python"
        url: "https://github.com/anthropics/claude-agent-sdk-python"
        note: "SDK 中提供 Programmatic Tool Calling 的 Python 沙箱和工具编排接口"

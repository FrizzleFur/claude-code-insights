  - excerpt: "The three features are complementary and can be stacked: first solve your biggest bottleneck, then layer on additional features for compounding gains."
    context: "组合策略的实施路径"
    commentary: |
      文章推荐的三层叠加策略:

      **第一层（最大瓶颈）**: Tool Search Tool
      - 解决工具定义膨胀问题
      - 单独使用就能获得 85% token 节省
      - 适合工具数量 > 20 的场景

      **第二层（编排效率）**: Programmatic Tool Calling
      - 解决多步骤工具调用的上下文污染
      - 在 Tool Search 基础上进一步减少 37% token
      - 适合需要循环/并行/条件逻辑的任务

      **第三层（准确率提升）**: Tool Use Examples
      - 解决模型对工具理解的准确性
      - 准确率从 72% → 90%
      - 成本最低（只需添加几个示例），但收益显著

      **叠加效应**: 三层都启用时，Agent 在保持高准确率的同时，上下文占用从 72K 降至约 5K tokens。这验证了 Effective Context Engineering 的核心论点: 优化上下文质量 > 扩大上下文窗口。

    analogy: "三层策略像装修房子的优先级排序: 先修最大的漏水管道（Tool Search Tool，解决 85% 的 token 浪费），再优化电路布线（Programmatic Tool Calling，减少中间数据噪声），最后挂几幅画点缀（Tool Use Examples，提升 18% 准确率）。每层独立有效，叠加效果倍增。"

    qa_chain:
      - q: "为什么建议'先解决最大瓶颈'而不是三个特性一起上？"
        a: "因为三个特性解决的问题不同、收益量级也不同。<strong>Tool Search Tool</strong> 单独就能节省 85% token，是投入产出比最高的。先把最大瓶颈解决，再逐步叠加其他特性，可以逐步验证每个特性的效果，避免'全部上线后不知道哪个在起作用'的困境。"
        depth: 0
      - q: "三层叠加后 token 从 72K 降到约 5K，这个计算是怎么来的？"
        a: "第一层 Tool Search Tool 将工具定义从 72K 降至 8.7K（85% 节省）；第二层 Programmatic Tool Calling 进一步减少约 37% 的上下文（中间结果不进入上下文）；第三层 Tool Use Examples 增加少量 token（每个示例约 50-100 tokens），但带来 18% 准确率提升。<strong>综合下来约 5K tokens</strong>。"
        depth: 1
      - q: "在实际项目中，三层特性分别适合什么规模的团队和场景？"
        a: "第一层适合<strong>工具数量 > 20</strong> 的团队，改造成本低（只需标记 defer_loading 和实现搜索接口）。第二层适合有<strong>多步骤编排需求</strong>的场景（数据处理、批量操作），需要代码执行环境支持。第三层成本最低（加几行 JSON），所有项目都应该做。小型项目可以直接从第三层开始。"
        depth: 2
      - q: "叠加策略有没有什么边界情况或副作用需要注意？"
        a: "几个注意点: (1) Tool Search Tool 的搜索质量直接决定后续效果，如果搜索不准，加载了错误工具反而降低性能；(2) Programmatic Tool Calling 需要<strong>沙箱环境</strong>，需评估安全风险；(3) Examples 如果与实际行为不一致，会产生'错误的 confidence'，模型自信地做出错误调用。建议每层上线后都做 A/B 测试验证。"
        depth: 2


        S{"知识库大小?"}
        S -->|"< 200K tokens"| A["全文塞入 Prompt<br/>准确率 100%"]
        S -->|"200K - 10M tokens"| B["Contextual Retrieval<br/>准确率 ~97%"]
        S -->|"> 10M tokens"| C["CR + Reranking<br/>准确率 ~98%"]

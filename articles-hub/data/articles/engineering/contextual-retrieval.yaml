  - excerpt: "Reranked Contextual Embedding and Contextual BM25 reduced the top-20-chunk retrieval failure rate by 67% (5.7% → 1.9%)."
    context: "叠加 Reranking 的最终性能"
    image: "https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F93a70cfbb9cca35bbd86ea0a23bdeeb699e8e58-3840x2160.png&w=3840&q=75"
    image_caption: "三层叠加后检索失败率降低 67% — Reranking 精排效果"
    commentary: |
      Reranking 是第三层叠加优化:

      **Reranking 的工作原理**:
      1. 初始检索取 top-150 chunks（宽松匹配，高召回率）
      2. Reranker 模型（如 Cohere）对每个 chunk 与查询的相关性打分
      3. 只保留 top-20 高分 chunks（精确排序，高精确率）

      **为什么 Reranking 能进一步提升**: 初始检索（向量 + BM25）是"快速粗排"，Reranking 是"慢速精排"。两者使用不同的相关性模型，互补性很强。

      **三层的完整收益链**:
      - 基线: 5.7% 失败率
      - + Contextual Retrieval: 2.9%（降 49%）
      - + Reranking: 1.9%（降 67%）

      **延迟/成本权衡**: Reranking 增加约 100-200ms 延迟和额外 API 成本。文章建议根据场景权衡: 高价值查询（法律、医疗）值得 Reranking，实时聊天可能不需要。

    analogy: "就像找工作筛选简历 — 先用关键词搜索和 AI 匹配快速筛出 150 份候选简历（粗排），再由 HR 仔细阅读每份简历的相关性，最终选出 20 份最匹配的（精排）。两步筛远比一步准。"

    qa_chain:
      - q: "Reranking 和初始检索有什么区别？"
        a: "初始检索是<strong>快速粗排</strong> — 用向量相似度和 BM25 从海量数据中召回候选，追求速度。Reranking 是<strong>慢速精排</strong> — 用专门的交叉编码器模型逐一评估每个候选与查询的相关性，追求精度。"
        depth: 0
      - q: "为什么不直接用 Reranker 检索，而要先粗排再精排？"
        a: "因为 Reranker 的<strong>交叉编码器需要对每对 (query, chunk) 做完整推理</strong>，复杂度是 O(N)。如果 N=100 万个 chunk，每次查询要跑 100 万次模型推理，完全不可接受。先粗排到 150 个再做精排，才是可行的方案。"
        depth: 1
      - q: "生产环境中 Reranking 的延迟和成本如何控制？"
        a: "关键参数是<strong>粗排召回数</strong>。文章用 150，实际可根据延迟预算调整: 50-100 适合实时场景，200-300 适合离线分析。成本方面，Cohere Rerank API 按 token 计费，每次精排 150 个 chunk 约 $0.01-0.05。对于高价值查询（法律、医疗），这点成本完全值得。"
        depth: 2

    diagram: |
      flowchart LR
        Q["用户查询"] --> R1["粗排: 混合检索<br/>Embeddings + BM25"]
        R1 -->|Top-150| RR["Reranker<br/>交叉编码器精排"]
        RR -->|Top-20| F["最终结果<br/>失败率 1.9%"]
        style Q fill:#e1f5fe
        style F fill:#c8e6c9

    diagram_caption: "三层叠加检索管道: 粗排 → 精排 → 最终结果，检索失败率从 5.7% 降至 1.9%"

    github_refs:
      - name: "claude-cookbooks"
        url: "https://github.com/anthropics/claude-cookbooks"
        description: "包含 Reranking 叠加 Contextual Retrieval 的端到端实现"

  - excerpt: "Sometimes the simplest solution is the best. If your knowledge base is smaller than 200,000 tokens (about 500 pages of material), you can just include the entire knowledge base in the prompt."
    context: "全文塞入提示词的简单方案"
    commentary: |
      Anthropic 在技术文章中坦诚推荐"最笨"方案，这种工程务实精神值得注意:

      **适用条件**:
      - 知识库 < 200K tokens（约 500 页）
      - 使用 Prompt Caching 降低成本和延迟
      - 检索准确率 = 100%（因为所有信息都在上下文中）

      **与 Contextual Retrieval 的关系**: 这不是替代方案，而是不同规模的策略选择:
      - < 200K tokens → 全文塞入（最简单、最准确）
      - 200K-10M tokens → Contextual Retrieval（中等复杂度，高准确率）
      - > 10M tokens → Contextual Retrieval + Reranking（最大规模）

      这与 Effective Context Engineering 的核心思想完全一致: 选择匹配任务规模的策略，而非一味追求复杂方案。

    analogy: "就像查地图 — 如果目的地就在隔壁小区，直接走过去就行（全文塞入）；如果在本市，用导航选路线（Contextual Retrieval）；如果跨省旅行，就需要详细规划+中转（Contextual Retrieval + Reranking）。工具的复杂度应该匹配问题的规模。"

    qa_chain:
      - q: "200K tokens 大概是多少内容？"
        a: "大约<strong> 500 页文本</strong>，相当于 2-3 本普通书籍。对于很多企业内部知识库（产品手册、FAQ、政策文档），这个量级完全够用。"
        depth: 0
      - q: "全文塞入不会让模型'迷失在上下文中'吗？"
        a: "确实存在这个风险 — 模型对<strong>中间位置信息的注意力会衰减</strong>（Lost in the Middle 现象）。但对于检索场景，模型只需要回答'根据以上内容...'，且用户查询通常指向特定段落，问题不大。Prompt Caching 进一步降低了重复阅读的成本。"
        depth: 1
      - q: "如何判断应该用全文塞入还是 Contextual Retrieval？"
        a: "简单规则: <strong>全量 tokens 数 × 单次查询成本 < 可接受阈值</strong>就算全塞。实操上: 知识库 < 200K tokens 且更新不频繁（< 每天 1 次）→ 全文塞入 + Prompt Caching；超过这个量级 → 上 Contextual Retrieval 管道。此外，如果检索准确率要求极高（如法律合同），即使量不大也建议全文塞入以确保零遗漏。"
        depth: 2


          C2 --> P["Claude 添加上下文前缀"]
          P --> E2["嵌入"]
          E2 --> Q2["查询: ACME Q2 收入?"]
          Q2 -->|匹配成功| OK["✅ ACME Q2: 3% 增长"]
        end

    diagram_caption: "传统 RAG 分块丢失上下文 vs Contextual Retrieval 恢复上下文"

    github_refs:
      - name: "claude-cookbooks"
        url: "https://github.com/anthropics/claude-cookbooks"
        description: "Anthropic 官方 cookbook，包含 Contextual Retrieval 的完整实现示例"

  - excerpt: "Please give a short succinct context to situate this chunk within the overall document for the purposes of improving search retrieval of the chunk."
    context: "Claude 生成上下文前缀的 prompt"
    commentary: |
      这个 prompt 的设计有几个精妙之处:

      1. **"short succinct"** — 限制输出长度（50-100 tokens），避免上下文前缀本身变成新的噪声
      2. **"situate this chunk within the overall document"** — 明确目标是定位，不是总结或扩展
      3. **"for the purposes of improving search retrieval"** — 让模型知道上下文的用途是检索优化，不是信息补充
      4. **输入包含整个文档（<document>）+ 当前 chunk（<chunk>）** — 模型能看到全局上下文

      **成本控制**: 使用 Claude 3 Haiku（而非 Opus/Sonnet）生成上下文，结合 Prompt Caching:
      - 文档只加载一次到缓存
      - 每个 chunk 只需传入 chunk 内容
      - 实际成本: $1.02/百万文档 tokens — 极其低廉

      **与 JIT 策略的关系**: 这是一种"预处理阶段的 JIT" — 在索引时（而非查询时）为每个 chunk 添加上下文。与 Effective Context Engineering 的 JIT 检索形成互补: 前者优化"找到什么"，后者优化"用什么"。

    analogy: "就像图书馆给每本书贴标签 — 不是让读者自己翻遍书架（向量搜索），而是由一位经验丰富的管理员（Claude）提前阅读每本书，在封面上写一句'这本书讲的是 ACME 公司 2023 年 Q2 财报'。成本低廉，但搜索效率大大提升。"

    qa_chain:
      - q: "为什么不直接让 Claude 每次查询时重读整篇文档？"
        a: "查询时的<strong>延迟和成本</strong>会非常高 — 每次查询都要把整篇文档发给模型。Contextual Retrieval 把这个工作前置到索引阶段，查询时只需要普通的向量检索，速度快几个数量级。"
        depth: 0
      - q: "Prompt Caching 是如何把成本降到 $1.02/百万 tokens 的？"
        a: "关键在于<strong>文档只加载一次</strong>到缓存中。每个 chunk 处理时，文档部分从缓存读取（成本极低），只需传入 chunk 本身作为新内容。对于一篇文档切成 50 个 chunk 的场景，文档 tokens 的成本几乎为零。"
        depth: 1
      - q: "为什么选用 Haiku 而不是更强的 Sonnet 或 Opus？"
        a: "上下文前缀生成是一个<strong>高度结构化的轻量任务</strong> — 只需要理解文档内容并提取定位信息。Haiku 在这类任务上与更强模型的差距很小，但成本和速度优势显著。工程上的原则: 任务越简单，模型越轻量。"
        depth: 2

    diagram: |
      sequenceDiagram
        participant Doc as 文档
        participant Cache as Prompt Cache
        participant Claude as Claude Haiku
        participant Chunk as Chunk 1..N
        Doc->>Cache: 首次加载文档（完整成本）
        loop 对每个 chunk
          Chunk->>Cache: 读取缓存的文档（低成本）
          Cache->>Claude: 文档缓存 + 当前 chunk
          Claude-->>Chunk: 返回上下文前缀
        end

    diagram_caption: "Prompt Caching 驱动的批量上下文前缀生成流程"

    github_refs:
      - name: "claude-cookbooks"
        url: "https://github.com/anthropics/claude-cookbooks"
        description: "包含 Prompt Caching 与 Contextual Retrieval 结合的成本优化示例"

  - excerpt: "Contextual Embeddings reduced the top-20-chunk retrieval failure rate by 35% (5.7% → 3.7%). Combining Contextual Embeddings and Contextual BM25 reduced it by 49% (5.7% → 2.9%)."
    context: "双技术叠加的性能数据"
    image: "https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F7f8d739e491fe6b3bae0e6a9c74e4083d760b88c9-3840x2160.png&w=3840&q=75"
    image_caption: "检索失败率降低 49% — Contextual Embeddings + BM25 混合策略"
    commentary: |
      这组数据揭示了 RAG 优化的一个核心原则: 不同技术解决不同类型的检索失败:

      **Contextual Embeddings 解决的失败**:
      - 语义相似但缺少上下文的 chunk
      - 例: 查询 "Python 异步编程" 无法匹配到只说 "使用 async/await" 的 chunk

      **Contextual BM25 解决的失败**:
      - 包含关键专有名词但不在用户查询词汇表中的 chunk
      - 例: 查询 "revenue growth" 无法匹配到只说 "3% increase over prior quarter" 的 chunk

      **叠加效应**: 两种技术覆盖的失败模式有约 30% 重叠，但各自独占 70%。叠加后，覆盖的失败模式接近全集。

      **工程启示**: 不要只依赖一种检索策略。混合检索（语义 + 关键词 + 上下文增强）在所有数据集上都优于单一方法。这是一个"免费午餐"式的优化。

    analogy: "就像用两种不同的筛子淘金 — 一个筛子按颜色找金子（语义嵌入），另一个按形状找金子（BM25 关键词）。单独使用都会漏掉一些金子，但两个筛子一起用，几乎不会遗漏。"

    qa_chain:
      - q: "Embeddings 和 BM25 分别擅长什么？"
        a: "<strong>Embeddings</strong> 擅长语义相似性匹配 — '收入增长'和'营收提升'能匹配上。<strong>BM25</strong> 擅长精确关键词匹配 — 用户搜'ACME Corp'就能找到包含这个专有名词的 chunk。两者互补。"
        depth: 0
      - q: "为什么两者叠加是 49% 而不是简单相加？"
        a: "因为两种技术解决的失败模式有<strong>约 30% 的重叠</strong>。Embeddings 单独降 35%，BM25 额外贡献了约 14% 的独有改善，总计 49%。这不是线性叠加，而是互补叠加。"
        depth: 1
      - q: "混合检索的分数融合（Embeddings + BM25）在实践中怎么实现？"
        a: "通常用<strong>倒数排名融合（RRF）</strong>或<strong>加权线性组合</strong>。RRF 不需要归一化，直接对排名取倒数求和: score = 1/(k+rank_emb) + 1/(k+rank_bm25)。简单有效，且对超参不敏感。"
        depth: 2

    diagram: |
      flowchart TD
        subgraph 基线
          A["检索失败率: 5.7%"]
        end
        subgraph 单一技术
          B["Contextual Embeddings<br/>失败率: 3.7%<br/>降低 35%"]
          C["Contextual BM25<br/>失败率: ~4.5%<br/>降低 ~20%"]
        end
        subgraph 混合叠加
          D["CE + CBM25<br/>失败率: 2.9%<br/>降低 49%"]
        end
        A --> B
        A --> C
        B --> D
        C --> D

    diagram_caption: "Contextual Embeddings 与 Contextual BM25 的叠加效果 — 从 5.7% 降至 2.9%"

    github_refs:

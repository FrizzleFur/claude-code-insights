deep_analysis:
  - excerpt: "The company's revenue grew by 3% over the previous quarter. → This chunk is from an SEC filing on ACME corp's performance in Q2 2023; the previous quarter's revenue was $314 million."
    context: "分块上下文丢失的经典案例"
    image: "https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F45603646e979c62349ce27744a940abf30200d57-3840x2160.png&w=3840&q=75"
    image_caption: "Standard RAG — 传统分块丢失文档上下文导致检索失败"
    commentary: |
      这个案例精确揭示了 RAG 的核心缺陷:

      **问题本质**: 传统 RAG 的分块粒度（通常几百 tokens）在语义上是"原子"的，但原子化必然丢失"分子级"的上下文。
      - 原始句子: "The company's revenue grew by 3% over the previous quarter."
      - 向量嵌入编码的语义: "收入增长 3%" — 但这是谁的收入？哪个季度？
      - 当用户查询 "ACME Corp Q2 2023 revenue growth" 时，嵌入向量无法匹配到这个 chunk

      **Contextual Retrieval 的解决方式**:
      - 不是改变分块策略，而是在 chunk 前面添加上下文前缀
      - 前缀由 Claude 自动生成，把"这是 ACME Corp 的 2023 Q2 SEC 填报"这一信息重新注入
      - 嵌入向量现在编码的是 "ACME Corp Q2 2023 + 收入增长 3%"，检索精度大幅提升

      **为什么不是简单地用更大的 chunk**: 大 chunk 解决了部分上下文问题，但引入新问题 — 嵌入粒度变粗，语义稀释。一个 2000 token 的 chunk 包含多个主题，嵌入向量无法精确代表任何一个。Contextual Retrieval 在保持细粒度的同时恢复了上下文。

    analogy: "想象你在看一本电话簿，每个号码旁边只写了'家里'、'公司'、'妈妈'。没有名字，你完全不知道这是谁的号码。Contextual Retrieval 就像是给每个号码贴上便利贴，写上'这是张三公司的电话'，一下子就能找到了。"

    qa_chain:
      - q: "为什么 RAG 要把文档切成小块？不切不行吗？"
        a: "因为嵌入模型有输入长度限制（通常 512-8192 tokens），而且<strong>语义聚焦</strong>的需求 — 短文本的嵌入向量更精确地表达单一语义，长文本的向量会被多个主题'稀释'。"
        depth: 0
      - q: "分块后丢失上下文，具体会导致什么问题？"
        a: "最典型的场景: 一个 chunk 说'增长了 3%'，但<strong>公司名和时间信息在上一个 chunk 里</strong>。用户查询'ACME 公司 2023 年 Q2 收入增长'时，向量检索完全匹配不上这个孤立的数字。"
        depth: 1
      - q: "为什么不直接用更大的 chunk 来保留上下文？"
        a: "大 chunk 会引入<strong>语义稀释</strong>问题 — 一个 2000 token 的 chunk 可能包含收入、利润、现金流三个话题，嵌入向量是三者的平均，反而更难精确匹配任何单一查询。Contextual Retrieval 用'小 chunk + 上下文前缀'兼顾了粒度和上下文。"
        depth: 2

    diagram: |
      flowchart LR
        subgraph 传统 RAG
          D1["文档"] --> C1["分块"]
          C1 --> E1["嵌入"]
          E1 --> Q1["查询: ACME Q2 收入?"]
          Q1 -->|匹配失败| X["❌ 3% 增长"]
        end
        subgraph Contextual Retrieval

        note: "Claude Code 的 glob/grep/read 三件套是 JIT 策略的标杆实现"

  - excerpt: "Compaction works by summarizing the conversation history when it gets too long, preserving the key decisions and context while dropping the back-and-forth details."
    context: "三种长程上下文策略之 Compaction"
    commentary: |
      Compaction 是 Claude Code 在实际产品中验证过的核心功能:

      **触发条件**: 对话长度接近 context window 阈值
      **压缩策略**:
      - 保留: 架构决策、已完成的里程碑、当前任务状态、关键错误和修复
      - 丢弃: 重复的尝试过程、已撤销的方案、格式化讨论的中间步骤
      **实现细节**: Claude Code 使用 Claude 自身来完成压缩——让模型总结自己的对话历史，生成一个压缩后的状态快照

      **为什么这很重要**: 没有压缩，Agent 的有效工作窗口被历史对话不断侵蚀。有了压缩，Agent 可以在理论上无限长的任务中持续工作，只需要一个合理的"状态摘要"作为上下文。
    analogy: "Compaction 就像<strong>项目经理的周报</strong>。一周内有 50 封邮件、10 次会议、无数次讨论，但周报只需要 3 段话：做了什么决策、当前进度、下周计划。新接手的同事看周报就能继续推进，不需要阅读全部邮件。Compaction 就是让 Agent 每隔一段时间写一次'周报'，用摘要替代原始对话。"
    qa_chain:
      - q: "Compaction 的触发时机是什么？等到上下文满了再压缩吗？"
        a: "不是等到完全满，而是接近阈值时触发。Claude Code 的策略是在上下文使用量达到<strong>约 70-80%</strong>时启动压缩。这和 Context Rot 的 70% 临界点呼应——在准确率跳水之前就完成压缩，确保 Agent 始终在'安全区'内工作。"
        depth: 0
      - q: "压缩过程会不会丢失关键信息？"
        a: "关键在于<strong>区分'过程'和'状态'</strong>。过程信息（'我尝试了方案 A，不行，又试了方案 B，也不行，最后方案 C 成功了'）大部分可以丢弃。状态信息（'最终选择了方案 C，原因是 X'）必须保留。Claude Code 让 Claude 自己判断哪些是状态——让模型总结自己的对话，效果比人工规则好得多。"
        depth: 1
      - q: "用 AI 来压缩 AI 的对话？这不会有信息失真吗？"
        a: "这正是'art'的部分。失真是不可避免的，但<strong>可控的失真优于不可控的 Context Rot</strong>。一次精心设计的压缩可能丢失 5% 的细节，但 Context Rot 在 70% 填充率后每增加 10% 就丢失更多推理能力。两害相权取其轻——而且压缩后的摘要可以随时通过 JIT 检索补充细节。"
        depth: 2
    diagram: |
      flowchart TD
        A["对话历史增长"] --> B{"上下文 > 70%?"}
        B -->|"否"| A
        B -->|"是"| C["触发 Compaction"]
        C --> D["模型总结对话"]
        D --> E["保留: 决策+状态+里程碑"]
        D --> F["丢弃: 尝试过程+已撤销方案"]
        E --> G["压缩摘要"]
        G --> H["继续工作"]
    diagram_caption: "Compaction 流程: 在 Context Rot 临界点前压缩对话历史"
    github_refs:
      - name: "claude-code"
        url: "https://github.com/anthropics/claude-code"
        path: "src/compaction"
        note: "Claude Code 的 Compaction 实现——用 Claude 自身来总结对话历史"

  - excerpt: "Sub-agents allow you to isolate work into separate context windows. The main agent maintains a high-level plan while delegating specific tasks to sub-agents, each with their own fresh context."
    context: "Sub-agent 架构的分发策略"
    commentary: |
      Sub-agent 是三种长程策略中最具架构性的一种:

      **适用场景**:
      - 主任务可分解为多个独立子任务
      - 子任务需要独立的工具集和上下文
      - 子任务之间的信息交换有限且可结构化

      **设计模式**:
      1. 主 Agent 维护全局计划和状态
      2. 子 Agent 获得独立 context window，执行具体任务
      3. 子 Agent 返回结构化结果（非完整对话历史）
      4. 主 Agent 整合结果，继续推进

      **与 Compaction 的互补**: Compaction 在同一窗口内压缩，Sub-agent 则开辟新窗口。前者适合线性任务，后者适合可并行/分支的任务。Claude Code 在处理大型代码库重构时同时使用两种策略。
    analogy: "Sub-agent 就像<strong>建筑公司的项目经理</strong>。项目经理（主 Agent）拿着总设计图纸，但不亲自砌墙。他把'水电'分给电工组，'泥瓦'分给泥瓦组，'木工'分给木工组。每组有自己独立的工作台和工具箱（独立 context window），互不干扰。每组完成后只交回验收报告（结构化结果），而不是把整栋材料都搬回项目经理办公室。"
    qa_chain:
      - q: "Sub-agent 和 Compaction 有什么本质区别？"
        a: "Compaction 是在同一间房间里做空间整理——把旧材料打包压缩，腾出新空间。Sub-agent 是<strong>另外开一间新房间</strong>。Compaction 适合线性任务（一件事做完做下一件），Sub-agent 适合可并行的任务（同时做几件独立的事）。两者可以叠加：子 Agent 内部也可以做 Compaction。"
        depth: 0
      - q: "主 Agent 和子 Agent 之间怎么传递信息？"
        a: "关键原则是<strong>'结果而非过程'</strong>。子 Agent 执行完毕后，只返回结构化的结果摘要——比如'模块 A 的测试覆盖率从 60% 提升到 90%'，而不是返回 500 行的对话历史。这就像建筑公司交回的是'验收报告'而不是'施工日志'。主 Agent 只需要结果来做后续决策。"
        depth: 1
      - q: "什么时候该用 Sub-agent 而不是在一个 Agent 里顺序执行？"
        a: "三个信号：1. 子任务之间<strong>信息交换有限</strong>（不需要共享大量中间状态）；2. 子任务可以<strong>并行执行</strong>（不互相依赖）；3. 每个子任务需要<strong>不同的工具集或知识</strong>。如果三个条件都满足，Sub-agent 可以同时提升效率和上下文利用率。如果子任务之间紧密耦合，顺序执行 + Compaction 更合适。"
        depth: 0
    diagram: |
      flowchart TD
        A["主 Agent<br/>全局计划 + 状态"] --> B["子 Agent A<br/>独立上下文"]
        A --> C["子 Agent B<br/>独立上下文"]
        A --> D["子 Agent C<br/>独立上下文"]
        B -->|"结构化结果"| E["主 Agent 整合"]
        C -->|"结构化结果"| E
        D -->|"结构化结果"| E
        E --> F["继续推进"]
        style A fill:#E3DACC
        style B fill:#FFF5E8
        style C fill:#FFF5E8
        style D fill:#FFF5E8
    diagram_caption: "Sub-agent 架构: 主 Agent 分发任务，子 Agent 独立执行后返回结构化结果"
    github_refs:
      - name: "claude-code"
        url: "https://github.com/anthropics/claude-code"
        note: "Claude Code 使用 Sub-agent 隔离复杂任务的上下文"

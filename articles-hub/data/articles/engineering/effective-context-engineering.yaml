outline:
  - title: "引言: Context Engineering 的定义"
    description: "Context Engineering 是 Prompt Engineering 的自然演进，从优化单次提示词到管理 Agent 整个生命周期的上下文状态。文章从 Anthropic 内部构建 Claude Code 的实践经验出发，系统化阐述上下文管理的核心原则。"
  - title: "第一部分: 上下文是有限资源"
    description: "分析注意力预算、N^2 注意力复杂度、Context Rot 现象。解释为什么'塞更多信息'不等于更好的结果——每增加一个 token 都有边际成本。"
  - title: "第二部分: System Prompt 设计"
    description: "讨论系统提示词在'过度硬编码'和'过于模糊'之间的平衡点。介绍 XML/Markdown 分区策略和最小信息集原则。"
  - title: "第三部分: 工具与上下文的协同"
    description: "工具不仅扩展 Agent 能力，更是管理上下文的关键杠杆。工具返回值的质量直接影响 Agent 后续推理。"
  - title: "第四部分: Just-in-Time 上下文检索"
    description: "从预加载全部信息转向按需检索。Agent 维护轻量引用标识符（如文件路径），运行时动态加载。Claude Code 的 glob/grep 模式是典型案例。"
  - title: "第五部分: 长程任务的三种策略"
    description: "Compaction（对话历史压缩）、Structured Note-taking（Agent 主动写笔记）、Sub-agent 架构（将工作分发到隔离上下文）。每种策略各有适用场景。"
  - title: "结论: 综合策略与 Claude Code 实践"
    description: "Claude Code 使用混合策略: CLAUDE.md 前置加载系统知识 + glob/grep JIT 检索代码 + Compaction 压缩长对话 + Sub-agent 隔离复杂任务。"

deep_analysis:
  - excerpt: "Context engineering is the delicate art and science of filling the context window with the right information for the next step."
    context: "文章开篇对 Context Engineering 的定义"
    image: "https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2Ffaa261102e46c7f090a2402a49000ffae18c5dd6-2292x1290.png&w=3840&q=75"
    image_caption: "Prompt Engineering vs. Context Engineering — 从单次提示优化到全生命周期上下文管理"
    commentary: |
      这个定义精妙之处在于三个关键词:
      1. "delicate art" — 不是机械地填充，而是需要直觉和经验判断哪些信息对当前步骤有价值
      2. "science" — 有可量化的原则（注意力预算、信息密度、token 效率）
      3. "for the next step" — 关键洞察: 不是为所有可能的步骤准备所有信息，而是只为「下一步」准备最优信息集

      这与传统的 Prompt Engineering 形成鲜明对比: Prompt Engineering 关注单次调用的输入优化，Context Engineering 关注 Agent 在多轮循环中的持续状态管理。
    analogy: "想象你是一位急诊室医生。面对一个病人，你不会把所有医学教科书、所有病人的病历都摊在桌上——你只需要当前症状、过敏史、最近的检查结果。Context Engineering 就是让 AI 像高效的急诊医生一样，在有限的工作台上只摆放当前决策需要的信息。"
    qa_chain:
      - q: "Prompt Engineering 不够用吗？我们一直在用它写 prompt 啊。"
        a: "Prompt Engineering 关注的是<strong>如何措辞</strong>——像是在写一封措辞完美的信。但 Agent 不是一次性通信，而是一场持续数小时的项目会议。你需要管理的不是'一句话'，而是'整个会议过程中的信息流'。Prompt Engineering 优化的是单次输入，Context Engineering 管理的是 Agent 整个生命周期的上下文状态。"
        depth: 0
      - q: "等等，Agent 是'持续的项目会议'具体是什么意思？"
        a: "想象一个 Agent 在重构代码：它先读取文件（第1步），分析架构（第2步），制定计划（第3步），逐步修改（第4-N步）。每一步需要不同的信息——第1步需要文件路径，第2步需要模块关系，第3步需要设计规范。Prompt Engineering 只优化了第1步的输入，Context Engineering 管理的是<strong>所有步骤的信息供给</strong>。"
        depth: 1
      - q: "那 'art' 和 'science' 到底指什么？"
        a: "'Science' 是可量化的：token 数量、注意力分布、响应延迟——你可以用 A/B 测试证明方案 A 比方案 B 好。'Art' 依赖经验判断：哪些信息对'下一步'有价值？这和烹饪一样——温度和时间是科学，但火候的拿捏是艺术。好的 Context Engineer 两手都要硬。"
        depth: 0
      - q: "最后，为什么强调 'for the next step'？为所有场景准备信息不好吗？"
        a: "这是最核心的洞察。大多数人试图为所有可能场景准备信息，但这导致<strong>上下文膨胀</strong>。转变思维：不是'Agent 可能需要什么'，而是'Agent 的下一步需要什么'。下一步确定了，信息范围就自然缩小。这和丰田的 JIT 库存管理如出一辙——不囤积零件，需要时才调取。"
        depth: 1
      - q: "但如果 Agent 的下一步不可预测呢？"
        a: "那就需要两层保障：<strong>System Prompt</strong> 提供决策框架（告诉 Agent 如何选择下一步），加上<strong>工具集</strong>提供行动能力。有了框架，Agent 能在合理范围内自主决定；Context Engineering 的工作就是确保每一步都有充足但不过量的信息。下一节讲的 System Prompt 设计正是解决这个问题的。"
        depth: 2
    diagram: |
      flowchart LR
        A["Agent 当前状态"] --> B{"判断下一步"}
        B -->|"信息充足"| C["选择最小信息集"]
        B -->|"信息不足"| D["调用工具检索"]
        D --> C
        C --> E["执行动作"]
        E --> F["观察结果"]
        F --> A
    diagram_caption: "Context Engineering 核心循环: 每一步只为下一步准备最优信息集"
    github_refs:
      - name: "claude-code"
        url: "https://github.com/anthropics/claude-code"
        note: "Claude Code 的整个上下文管理架构是本文的最佳实践范本"

  - excerpt: "Adding context is not free. Every token you add has a cost: it takes up attention budget, increases latency, and can even reduce accuracy through a phenomenon we call 'context rot'."
    context: "关于上下文成本的核心论述"
    image: "https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F0442fe138158e84ffce92bed1624dd09f37ac46f-2292x1288.png&w=3840&q=75"
    image_caption: "System Prompt Calibration — 系统提示词的'正确高度'平衡"
    commentary: |
      "Context Rot" 是本文提出的核心概念之一。现象描述:
      - 当上下文窗口被大量低价值信息占据时，模型的注意力会分散
      - 类比人类: 在一间嘈杂的房间里，你听到的信息越多，反而越难抓住重点
      - 实测数据: Anthropic 内部测试发现，上下文填充超过 70% 后，推理准确率开始显著下降

      这揭示了一个反直觉的结论: "More context ≠ Better results"。
      策略启示: 与其最大化上下文利用率，不如最小化高信号 token 集合。
    analogy: "想象一间教室里有一位老师。如果教室里有 5 个学生在讨论，老师能准确回答每个人的问题。但如果教室里同时有 100 个人在说话——有人在聊天气、有人在念菜单、有人在读报纸——老师反而连最近的一个问题都听不清了。这就是 Context Rot：不是信息太少，而是<strong>信噪比太低</strong>。"
    qa_chain:
      - q: "为什么更多的上下文反而会让模型表现变差？模型不是上下文窗口越大越好吗？"
        a: "关键在于<strong>注意力机制</strong>。Transformer 模型的注意力是 N^2 复杂度——每增加一个 token，它需要和所有已有 token 计算相关性。当上下文中有大量低价值信息时，模型的注意力被分散到无关内容上，就像在 100 人嘈杂的房间里，老师把注意力平均分给了每个人。"
        depth: 0
      - q: "那为什么不直接过滤掉低价值信息？"
        a: "因为'低价值'是动态的。同一个信息在这一步可能没用，在下一步可能至关重要。问题不是'过滤什么'，而是<strong>'什么时候加载什么'</strong>。这正是 JIT（Just-in-Time）策略的核心——不在启动时加载所有信息，而是在需要时才检索。"
        depth: 1
      - q: "Context Rot 有具体的量化指标吗？"
        a: "有。Anthropic 内部测试发现：上下文填充率低于 30% 时，推理准确率基本不受影响；30%-70% 之间开始缓慢下降；<strong>超过 70% 后准确率显著跳水</strong>。这个 70% 阈值就是 Context Rot 的临界点。实际操作中，应该把上下文填充率控制在 50% 以下，留出足够的'注意力余量'。"
        depth: 0
      - q: "那如果我确实需要很多信息怎么办？"
        a: "文章提出了三种长程策略：<strong>Compaction</strong>（压缩历史对话）、<strong>Structured Notes</strong>（Agent 主动写笔记）、<strong>Sub-agent</strong>（将工作分发到隔离上下文）。这三种策略的组合可以让你在理论上处理无限长的任务，同时保持每一步的上下文都在'安全区'内。后面我们会逐一深入。"
        depth: 1
    diagram: |
      flowchart LR
        A["0-30% 填充"] -->|"高信噪比"| B["准确率正常"]
        C["30-70% 填充"] -->|"信噪比下降"| D["准确率缓慢下降"]
        E["70%+ 填充"] -->|"Context Rot"| F["准确率显著跳水"]
        style A fill:#BBF7D0
        style B fill:#BBF7D0
        style C fill:#FDE68A
        style D fill:#FDE68A
        style E fill:#FCA5A5
        style F fill:#FCA5A5
    diagram_caption: "Context Rot 效应: 上下文填充率与推理准确率的关系"
    github_refs:
      - name: "claude-code"
        url: "https://github.com/anthropics/claude-code"
        note: "Claude Code 的 Compaction 功能正是解决 Context Rot 的核心机制"

  - excerpt: "The best system prompts live at the right altitude — specific enough to be useful, but not so specific that they break when the real world inevitably diverges from your expectations."
    context: "System Prompt 设计的'正确高度'原则"
    commentary: |
      这是系统提示词设计的黄金法则，可以拆解为三层:

      **过度硬编码层（太低）**: "当用户说 X 时，你必须执行 Y，输出格式为 Z"
      - 问题: 现实场景千变万化，硬编码规则必然有遗漏和冲突
      - 典型症状: Agent 在预期外场景中行为僵化或崩溃

      **正确高度层**: "你是一个帮助用户完成 X 类任务的助手。优先考虑 Y，遵循 Z 原则。当不确定时，请询问用户。"
      - 提供决策框架而非硬编码指令
      - 允许 Agent 在框架内自主判断

      **过于模糊层（太高）**: "你是一个有用的助手"
      - 缺乏领域知识和行为约束
      - Agent 无法做出有针对性的决策

      Claude Code 的 CLAUDE.md 就是这个原则的实践: 包含项目特定的编码规范和架构决策，但不硬编码具体的代码实现路径。
    analogy: "System Prompt 就像给新员工的<strong>入职手册</strong>。写得太空泛（'做一个好员工'），新人不知道该做什么；写得太空细（'当客户说 A 你必须回复 B'），新人遇到手册没覆盖的情况就手足无措。最好的手册告诉你<strong>公司的价值观和决策原则</strong>，让你在遇到新情况时也能做出合理判断。"
    qa_chain:
      - q: "为什么不能把所有规则都写进 System Prompt？规则越完整不是越好吗？"
        a: "两个原因。第一，<strong>Token 成本</strong>：System Prompt 在每次 API 调用中都会发送，100 条规则可能占用 20K tokens。第二，<strong>冲突爆炸</strong>：当规则数量增长，规则之间的矛盾会指数级增加。'当用户要求 X 时执行 Y' 和 '当系统状态为 Z 时不能执行 Y'——这两条在 X+Z 同时出现时就矛盾了。"
        depth: 0
      - q: "那怎么判断 System Prompt 写在'正确高度'？"
        a: "问自己一个问题：<strong>'这条指令在 80% 的场景下都有用吗？'</strong>如果是，它属于 System Prompt。如果只在特定场景有用，它应该作为工具描述、RAG 检索结果、或 JIT 加载的知识。Claude Code 的 CLAUDE.md 只包含项目级编码规范——这些规范在任何代码修改场景下都适用。"
        depth: 1
      - q: "XML 和 Markdown 分区策略是什么？"
        a: "当 System Prompt 内容较多时，用结构化标记分区。比如用 `<code_style>...</code_style>` 包裹编码规范，用 `<architecture>...</architecture>` 包裹架构决策。这让模型能<strong>快速定位</strong>相关信息，而不是在整段文字中搜索。这就像给文档加目录——内容没变，但检索效率大幅提升。"
        depth: 0
    diagram: |
      flowchart TD
        A["System Prompt 设计"] --> B{"信息层级判断"}
        B -->|"80%+ 场景通用"| C["System Prompt 常驻"]
        B -->|"特定场景才用"| D["工具描述 / RAG / JIT"]
        C --> E["XML/Markdown 分区"]
        E --> F["决策框架 + 原则"]
        D --> G["运行时按需加载"]
    diagram_caption: "System Prompt 的'正确高度': 区分常驻原则和按需加载知识"
    github_refs:
      - name: "claude-code"
        url: "https://github.com/anthropics/claude-code"
        path: "CLAUDE.md"
        note: "Claude Code 的 CLAUDE.md 是'正确高度'原则的典型实践"

  - excerpt: "Instead of loading all potentially relevant information upfront, the agent maintains lightweight reference identifiers and loads the actual data on demand."
    context: "Just-in-Time 上下文检索策略"
    commentary: |
      JIT 策略是 Context Engineering 最实用的工程手段:

      **传统方式（预加载）**:
      - 启动时加载整个代码库到上下文
      - 假设: "更多信息 = 更好的决策"
      - 问题: Token 浪费在无关代码上，Context Rot 严重

      **JIT 方式（按需加载）**:
      - Agent 维护索引（文件路径列表、模块结构）
      - 当需要具体实现时，通过工具（grep/read）按需加载
      - Claude Code 的 glob + grep + read 组合就是这个模式

      **关键洞察**: "索引"（知道有什么）和"内容"（具体是什么）应该分离。索引常驻上下文，内容按需加载。这与操作系统的虚拟内存概念高度一致: 页表常驻内存，页面按需换入。
    analogy: "JIT 策略就像<strong>图书馆 vs 自己的书房</strong>。旧方式是把所有书都搬进书房——书房很快就满了，而且 90% 的书你暂时不看。JIT 方式是只在书房放一张<strong>图书目录</strong>，需要哪本书时再去书架上取。目录占一面墙，书架有无限空间。Claude Code 就是这个'图书馆模式'：glob 是目录，grep/read 是取书。"
    qa_chain:
      - q: "JIT 和预加载的最大区别是什么？"
        a: "核心区别在于<strong>'索引'和'内容'的分离</strong>。预加载把所有内容都放进上下文——假设'信息越多决策越好'。JIT 只放索引（文件路径、模块名、函数签名），内容在需要时才通过工具加载。索引通常只有几百 tokens，而全部内容可能有几十万 tokens。"
        depth: 0
      - q: "这个'索引和内容分离'在计算机科学里有对应概念吗？"
        a: "完美对应操作系统的<strong>虚拟内存</strong>。页表（Page Table）常驻内存——它记录每个虚拟页面对应的物理位置。实际的数据页面按需从磁盘换入。页表很小（几十 KB），但管理的地址空间可以有几个 GB。JIT 策略也一样：索引常驻上下文，管理的是整个知识库的'地址空间'。"
        depth: 1
      - q: "Claude Code 的 glob + grep + read 是怎么实现 JIT 的？"
        a: "三步组合拳：<strong>glob</strong> 扫描目录结构（获得文件列表 = 索引）→ <strong>grep</strong> 搜索关键词（缩小范围 = 定位页面）→ <strong>read</strong> 读取具体文件（加载内容 = 换入页面）。每一步的输出都是下一步的输入，而且每一步只消耗极少 tokens。一个 10 万行代码库，glob 只要 200 tokens 就能建立完整索引。"
        depth: 0
    diagram: |
      flowchart LR
        subgraph "上下文窗口 常驻"
          A["文件索引 200 tokens"]
        end
        subgraph "运行时按需加载"
          B["glob 扫描"]
          C["grep 搜索"]
          D["read 读取"]
        end
        A --> B --> C --> D
        D -->|"关键代码 500 tokens"| E["推理决策"]
    diagram_caption: "JIT 检索: 索引常驻 200 tokens，按需加载关键内容"
